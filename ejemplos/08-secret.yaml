# ============================================================================
#  SECRET  —  Datos SENSIBLES en la BBDD del clúster (almacenados cifrados)
# ----------------------------------------------------------------------------
#  Igual que un ConfigMap, pero para credenciales. OJO: base64 NO es cifrado,
#  es solo una codificación; el cifrado lo aporta Kubernetes al guardarlo.
#
#  Dos formas de meter los valores:
#   - data       : los valores van en BASE64.
#   - stringData : los valores van en TEXTO PLANO (Kubernetes los codifica).
#
#  Generar un valor base64:   echo -n 'password' | base64   ->  cGFzc3dvcmQ=
#  Alternativa sin fichero:
#     kubectl create secret generic credenciales-bbdd \
#        --from-literal=root-password=secreta \
#        --from-literal=usuario=usuario \
#        --from-literal=password=password
#
#  Aplicar:    kubectl apply -f 08-secret.yaml
#  Consultar:  kubectl get secret   (los valores no se muestran en claro)
# ============================================================================
kind: Secret
apiVersion: v1
metadata:
  name: credenciales-bbdd
type: Opaque                     # tipo genérico (clave-valor arbitrario)

# --- Opción A: valores en base64 -------------------------------------------
data:
  root-password: c2VjcmV0YQ==    # "secreta"
  usuario: dXN1YXJpbw==          # "usuario"
  password: cGFzc3dvcmQ=         # "password"

# --- Opción B (equivalente, más cómoda): texto plano -----------------------
#  Descomenta este bloque (y comenta 'data') si prefieres no codificar a mano.
# stringData:
#   root-password: secreta
#   usuario: usuario
#   password: password
