# ============================================================================
#  CONSUMO DE CONFIGMAP Y SECRET  —  Las tres formas de inyectarlos en un Pod
# ----------------------------------------------------------------------------
#  Requiere que existan 07-configmap.yaml y 08-secret.yaml.
#  Muestra las tres maneras de consumir configuración:
#   1) env + valueFrom : inyectar UNA clave concreta como variable de entorno.
#   2) envFrom         : inyectar TODAS las claves de golpe como variables.
#   3) volume          : montar el ConfigMap como FICHEROS dentro del contenedor.
#  Regla: si una clave coincide, 'env' tiene prioridad sobre 'envFrom'.
#
#  Aplicar:    kubectl apply -f 07-configmap.yaml -f 08-secret.yaml -f 09-pod-consumo-configmap-secret.yaml
#  Comprobar:  kubectl exec -it consumo-config -- env | sort
#              kubectl exec -it consumo-config -- ls /etc/config
# ============================================================================
kind: Pod
apiVersion: v1
metadata:
  name: consumo-config

spec:
  containers:
    - name: demo
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]

      env:
        # 1) Una clave concreta de un ConfigMap como variable de entorno
        - name: COLOR
          valueFrom:
            configMapKeyRef:
              name: configuracion-app
              key: APP_COLOR
        # 1b) Una clave concreta de un Secret como variable de entorno
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: credenciales-bbdd
              key: password

      envFrom:
        # 2) TODAS las claves del ConfigMap como variables de entorno
        - configMapRef:
            name: configuracion-app

      volumeMounts:
        # 3) El ConfigMap montado como ficheros (cada clave -> un fichero)
        - name: config-files
          mountPath: /etc/config

  volumes:
    - name: config-files
      configMap:
        name: configuracion-app
