# WordPress + MariaDB sencillo para el curso (namespace curso-ivan).
# PVCs en NFS, ingress interno con CA interna en wordpress-ivan.ivanosuna.com.
#
# Aplicar:  kubectl apply -f wordpress-curso-ivan.yaml
# Borrar:   kubectl delete -f wordpress-curso-ivan.yaml   (y los PVC si se quiere)
---
apiVersion: v1
kind: Namespace
metadata:
  name: curso-ivan
---
apiVersion: v1
kind: Secret
metadata:
  name: wordpress-db
type: Opaque
stringData:
  MARIADB_ROOT_PASSWORD: "root-curso-2026"
  MARIADB_DATABASE: "wordpress"
  MARIADB_USER: "wordpress"
  MARIADB_PASSWORD: "wp-curso-2026"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-data
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: primary-nfs-class
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-data
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: primary-nfs-class
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: wordpress-db
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mariadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress:php8.3-apache
          imagePullPolicy: IfNotPresent
          env:
            - name: WORDPRESS_DB_HOST
              value: mariadb
            - name: WORDPRESS_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: MARIADB_DATABASE
            - name: WORDPRESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: MARIADB_USER
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: MARIADB_PASSWORD
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /var/www/html
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wordpress-data
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress
spec:
  selector:
    app: wordpress
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wordpress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: ingress-public
  tls:
    - hosts:
        - wordpress-ivan.ivanosuna.com
      secretName: wordpress-ivan-tls
  rules:
    - host: wordpress-ivan.ivanosuna.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wordpress
                port:
                  number: 80
